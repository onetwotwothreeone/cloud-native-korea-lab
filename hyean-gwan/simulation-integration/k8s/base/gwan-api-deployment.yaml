apiVersion: apps/v1
kind: Deployment
metadata:
  name: gwan-api
  namespace: hyean-gwan
  labels:
    app.kubernetes.io/name: gwan-api
    app.kubernetes.io/part-of: hyean
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gwan-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gwan-api
        app.kubernetes.io/part-of: hyean
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: gwan-api
          image: ghcr.io/onetwotwothreeone/hyean-gwan-simulation:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gwan-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql+psycopg://hyean:$(POSTGRES_PASSWORD)@postgres:5432/hyean_gwan
            - name: HYEAN_MEMORY_JSONL_PATH
              value: /tmp/hyean-gwan-memory.jsonl
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
