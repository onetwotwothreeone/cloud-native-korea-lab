apiVersion: apps/v1
kind: Deployment
metadata:
  name: gwan-api
  namespace: hyean-gwan
  labels:
    app.kubernetes.io/name: gwan-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: hyean
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gwan-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gwan-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: hyean
    spec:
      serviceAccountName: gwan-api-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gwan-api
          image: ghcr.io/onetwotwothreeone/hyean-gwan-simulation:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: gwan-api-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: gwan-api-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: gwan-api-config
                  key: DATABASE_NAME
            - name: DATABASE_DIALECT
              valueFrom:
                configMapKeyRef:
                  name: gwan-api-config
                  key: DATABASE_DIALECT
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: gwan-api-config
                  key: DATABASE_USER
            - name: HYEAN_MEMORY_JSONL_PATH
              valueFrom:
                configMapKeyRef:
                  name: gwan-api-config
                  key: HYEAN_MEMORY_JSONL_PATH
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gwan-postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql+psycopg://$(DATABASE_USER):$(POSTGRES_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)
            - name: DATABASE_ENDPOINT
              value: $(DATABASE_HOST):$(DATABASE_PORT)
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          volumeMounts:
            - name: gwan-api-tmp
              mountPath: /tmp
      volumes:
        - name: gwan-api-tmp
          emptyDir: {}
