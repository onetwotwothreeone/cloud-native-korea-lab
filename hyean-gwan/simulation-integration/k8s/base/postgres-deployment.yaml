apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: hyean-gwan
  labels:
    app.kubernetes.io/name: gwan-postgres
    app.kubernetes.io/part-of: hyean
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gwan-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gwan-postgres
        app.kubernetes.io/part-of: hyean
        app.kubernetes.io/component: database
    spec:
      serviceAccountName: gwan-postgres-sa
      automountServiceAccountToken: false
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: gwan-postgres-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - hyean
                - -d
                - hyean_gwan
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - hyean
                - -d
                - hyean_gwan
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
