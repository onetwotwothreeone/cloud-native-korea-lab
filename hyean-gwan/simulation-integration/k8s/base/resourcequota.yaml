apiVersion: v1
kind: ResourceQuota
metadata:
  name: hyean-gwan-resource-quota
  namespace: hyean-gwan
  labels:
    app.kubernetes.io/part-of: hyean
    app.kubernetes.io/component: namespace-policy
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
    pods: "10"
    services: "4"
    secrets: "10"
    configmaps: "10"
