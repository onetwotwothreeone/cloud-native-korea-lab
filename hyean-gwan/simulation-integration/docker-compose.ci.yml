services:
  postgres:
    image: postgres:16-alpine
    container_name: hyean-gwan-postgres-ci
    environment:
      POSTGRES_USER: hyean
      POSTGRES_PASSWORD: hyean_password
      POSTGRES_DB: hyean_gwan
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyean -d hyean_gwan"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "55432:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hyean-gwan-simulation:compose-ci
    container_name: hyean-gwan-api-ci
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://hyean:hyean_password@postgres:5432/hyean_gwan
      HYEAN_MEMORY_JSONL_PATH: /tmp/hyean-gwan-memory.jsonl
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\nPY"]
      interval: 5s
      timeout: 5s
      retries: 10
