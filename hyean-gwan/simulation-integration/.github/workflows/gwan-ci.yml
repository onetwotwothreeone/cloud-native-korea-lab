name: GWAN CI

on:
  push:
    branches:
      - main
    paths:
      - "hyean-gwan/simulation-integration/**"
      - ".github/workflows/gwan-ci.yml"
  pull_request:
    paths:
      - "hyean-gwan/simulation-integration/**"
      - ".github/workflows/gwan-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test-build-compose-and-publish:
    name: Test, build, Compose, and publish image
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: hyean-gwan/simulation-integration

    env:
      DATABASE_URL: sqlite+pysqlite:////tmp/hyean-gwan-ci.db
      HYEAN_MEMORY_JSONL_PATH: /tmp/hyean-gwan-memory.jsonl
      GHCR_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hyean-gwan-simulation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: hyean-gwan/simulation-integration/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Check key documentation files
        run: |
          test -f README.md
          test -f docs/API_REFERENCE.md
          test -f docs/LOCAL_RUNBOOK.md
          test -f docs/18_GWAN_LongTermMemory_To_Onboard_Pull_And_Recommendation.md
          test -f docs/19_GWAN_GitHub_Actions_CI.md
          test -f docs/20_GWAN_Docker_Image_Build_CI.md
          test -f docs/21_GWAN_Docker_Compose_CI.md
          test -f docs/22_GWAN_GHCR_Image_Push.md

      - name: Build Docker image
        run: docker build -t hyean-gwan-simulation:ci .

      - name: Smoke test Docker container
        run: |
          docker run -d --name hyean-gwan-ci -p 8000:8000 \
            -e DATABASE_URL="sqlite+pysqlite:////tmp/hyean-gwan-container-ci.db" \
            -e HYEAN_MEMORY_JSONL_PATH="/tmp/hyean-gwan-memory-container-ci.jsonl" \
            hyean-gwan-simulation:ci
          sleep 8
          curl -f http://127.0.0.1:8000/health
          docker logs hyean-gwan-ci
          docker rm -f hyean-gwan-ci

      - name: Docker Compose integration test
        run: |
          docker compose -f docker-compose.ci.yml up -d --build
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... attempt $i"
            sleep 2
          done
          curl -f http://127.0.0.1:8000/health
          curl -f http://127.0.0.1:8000/gwan/memory/db-status
          docker compose -f docker-compose.ci.yml logs api
          docker compose -f docker-compose.ci.yml logs postgres

      - name: Clean up Docker Compose
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v --remove-orphans

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: hyean-gwan/simulation-integration
          file: hyean-gwan/simulation-integration/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
