name: FastAPI CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-fastapi:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mini-platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest

  build-docker-image:
    runs-on: ubuntu-latest
    needs: test-fastapi

    defaults:
      run:
        working-directory: mini-platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t cnkl-fastapi-mini-platform:ci .
