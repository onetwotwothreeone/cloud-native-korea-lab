name: FastAPI CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  test-fastapi:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mini-platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m pytest

  build-and-push-docker-image:
    runs-on: ubuntu-latest
    needs: test-fastapi

    defaults:
      run:
        working-directory: mini-platform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/onetwotwothreeone/cnkl-fastapi-mini-platform:latest \
            -t ghcr.io/onetwotwothreeone/cnkl-fastapi-mini-platform:${{ github.sha }} \
            .

      - name: Push Docker image to GHCR
        run: |
          docker push ghcr.io/onetwotwothreeone/cnkl-fastapi-mini-platform:latest
          docker push ghcr.io/onetwotwothreeone/cnkl-fastapi-mini-platform:${{ github.sha }}
