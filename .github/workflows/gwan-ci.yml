name: GWAN CI

on:
  push:
    branches:
      - main
    paths:
      - "hyean-gwan/simulation-integration/**"
      - ".github/workflows/gwan-ci.yml"
  pull_request:
    paths:
      - "hyean-gwan/simulation-integration/**"
      - ".github/workflows/gwan-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test-build-compose-publish-and-kind:
    name: Test, Docker, Compose, GHCR, and kind Kubernetes
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: hyean-gwan/simulation-integration

    env:
      DATABASE_URL: sqlite+pysqlite:////tmp/hyean-gwan-ci.db
      HYEAN_MEMORY_JSONL_PATH: /tmp/hyean-gwan-memory.jsonl
      GHCR_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hyean-gwan-simulation
      KIND_CLUSTER_NAME: hyean-gwan-ci
      KIND_VERSION: v0.32.0
      GWAN_KIND_IMAGE: ghcr.io/onetwotwothreeone/hyean-gwan-simulation:latest
      KIND_PRODUCTION_CLUSTER_NAME: hyean-gwan-production-ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: hyean-gwan/simulation-integration/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Check key documentation files
        run: |
          test -f README.md
          test -f docs/API_REFERENCE.md
          test -f docs/LOCAL_RUNBOOK.md
          test -f docs/18_GWAN_LongTermMemory_To_Onboard_Pull_And_Recommendation.md
          test -f docs/19_GWAN_GitHub_Actions_CI.md
          test -f docs/20_GWAN_Docker_Image_Build_CI.md
          test -f docs/21_GWAN_Docker_Compose_CI.md
          test -f docs/22_GWAN_GHCR_Image_Push.md
          test -f docs/23_GWAN_Kubernetes_Manifests.md
          test -f docs/24_GWAN_Kubernetes_Local_Run.md
          test -f docs/25_GWAN_Kubernetes_Overlays_Local_And_Production.md
          test -f docs/26_GWAN_Kubernetes_CI_With_Kind.md
          test -f docs/27_GWAN_Kubernetes_Production_GHCR_Pull.md
          test -f docs/28_GWAN_Kubernetes_Production_Secrets_And_Config.md
          test -f docs/29_GWAN_Kubernetes_Health_Readiness_And_Observability_Baseline.md
          test -f docs/30_GWAN_Kubernetes_Resource_Requests_And_Limits.md
          test -f docs/31_GWAN_Kubernetes_Namespace_ResourceQuota_And_LimitRange.md
          test -f docs/32_GWAN_Kubernetes_HPA_Autoscaling_Baseline.md
          test -f docs/33_GWAN_Kubernetes_Metrics_Server_And_HPA_Readiness.md
          test -f docs/34_GWAN_Kubernetes_HPA_Behavior_Policy.md
          test -f docs/35_GWAN_Kubernetes_PodDisruptionBudget.md
          test -f docs/36_GWAN_Kubernetes_NetworkPolicy_Baseline.md
          test -f docs/37_GWAN_Kubernetes_ServiceAccount_RBAC_Baseline.md
          test -f docs/38_GWAN_Kubernetes_SecurityContext_Baseline.md

      - name: Build Docker image
        run: docker build -t hyean-gwan-simulation:ci .

      - name: Smoke test Docker container
        run: |
          docker run -d --name hyean-gwan-ci -p 8000:8000 \
            -e DATABASE_URL="sqlite+pysqlite:////tmp/hyean-gwan-container-ci.db" \
            -e HYEAN_MEMORY_JSONL_PATH="/tmp/hyean-gwan-memory-container-ci.jsonl" \
            hyean-gwan-simulation:ci
          sleep 8
          curl -f http://127.0.0.1:8000/health
          docker logs hyean-gwan-ci
          docker rm -f hyean-gwan-ci

      - name: Docker Compose integration test
        run: |
          docker compose -f docker-compose.ci.yml up -d --build
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... attempt $i"
            sleep 2
          done
          curl -f http://127.0.0.1:8000/health
          curl -f http://127.0.0.1:8000/gwan/memory/db-status
          docker compose -f docker-compose.ci.yml logs api
          docker compose -f docker-compose.ci.yml logs postgres

      - name: Clean up Docker Compose
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v --remove-orphans

      - name: Install kind
        run: |
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Create kind cluster
        run: |
          kind create cluster --name "${KIND_CLUSTER_NAME}" --wait 120s
          kubectl cluster-info --context "kind-${KIND_CLUSTER_NAME}"
          kubectl get nodes

      - name: Build and load image into kind
        run: |
          docker build -t "${GWAN_KIND_IMAGE}" .
          kind load docker-image "${GWAN_KIND_IMAGE}" --name "${KIND_CLUSTER_NAME}"

      - name: Apply Kubernetes local overlay in kind
        run: |
          kubectl apply -k k8s/overlays/local
          kubectl -n hyean-gwan rollout status deployment/postgres --timeout=180s
          kubectl -n hyean-gwan rollout status deployment/gwan-api --timeout=180s
          kubectl -n hyean-gwan get pods
          kubectl -n hyean-gwan get svc

      - name: Kubernetes namespace policy check
        run: scripts/k8s/namespace_policy_check.sh

      - name: Kubernetes HPA check
        run: bash scripts/k8s/hpa_check.sh

      - name: Kubernetes metrics server readiness check
        run: bash scripts/k8s/metrics_server_check.sh

      - name: Kubernetes HPA behavior policy check
        run: bash scripts/k8s/hpa_behavior_check.sh

      - name: Kubernetes PDB check
        run: bash scripts/k8s/pdb_check.sh

      - name: Kubernetes NetworkPolicy check
        run: bash scripts/k8s/network_policy_check.sh

      - name: Kubernetes RBAC check
        run: bash scripts/k8s/rbac_check.sh

      - name: Kubernetes SecurityContext check
        run: bash scripts/k8s/security_context_check.sh

      - name: Kubernetes API health check through port-forward
        run: |
          kubectl -n hyean-gwan port-forward svc/gwan-api 8000:8000 > /tmp/gwan-kind-port-forward.log 2>&1 &
          echo $! > /tmp/gwan-kind-port-forward.pid
          sleep 8
          curl -f http://127.0.0.1:8000/health
          curl -f http://127.0.0.1:8000/gwan/memory/db-status
          kill "$(cat /tmp/gwan-kind-port-forward.pid)" || true
          cat /tmp/gwan-kind-port-forward.log

      - name: Dump Kubernetes diagnostics
        if: always()
        run: |
          kubectl -n hyean-gwan get all || true
          kubectl -n hyean-gwan describe pods || true
          kubectl -n hyean-gwan logs deployment/gwan-api || true
          kubectl -n hyean-gwan logs deployment/postgres || true

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name "${KIND_CLUSTER_NAME}"

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: hyean-gwan/simulation-integration
          file: hyean-gwan/simulation-integration/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create production kind cluster
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          kind create cluster --name "${KIND_PRODUCTION_CLUSTER_NAME}" --wait 120s
          kubectl cluster-info --context "kind-${KIND_PRODUCTION_CLUSTER_NAME}"
          kubectl get nodes

      - name: Create GHCR image pull secret in production kind
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          kubectl create namespace hyean-gwan --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n hyean-gwan create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --docker-email="actions@github.com" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes production overlay from GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          kubectl apply -k k8s/overlays/production
          kubectl -n hyean-gwan rollout status deployment/postgres --timeout=180s
          kubectl -n hyean-gwan rollout status deployment/gwan-api --timeout=240s
          kubectl -n hyean-gwan get pods
          kubectl -n hyean-gwan get svc

      - name: Production namespace policy check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: scripts/k8s/namespace_policy_check.sh

      - name: Production HPA check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bash scripts/k8s/hpa_check.sh

      - name: Production metrics server readiness check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bash scripts/k8s/metrics_server_check.sh

      - name: Production HPA behavior policy check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bash scripts/k8s/hpa_behavior_check.sh

      - name: Production PDB check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bash scripts/k8s/pdb_check.sh

      - name: Production NetworkPolicy check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bash scripts/k8s/network_policy_check.sh

      - name: Production RBAC check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bash scripts/k8s/rbac_check.sh

      - name: Production SecurityContext check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bash scripts/k8s/security_context_check.sh

      - name: Production overlay health check through port-forward
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          kubectl -n hyean-gwan port-forward svc/gwan-api 8000:8000 > /tmp/gwan-production-port-forward.log 2>&1 &
          echo $! > /tmp/gwan-production-port-forward.pid
          sleep 8
          curl -f http://127.0.0.1:8000/health
          curl -f http://127.0.0.1:8000/gwan/memory/db-status
          kill "$(cat /tmp/gwan-production-port-forward.pid)" || true
          cat /tmp/gwan-production-port-forward.log

      - name: Dump production Kubernetes diagnostics
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          kubectl -n hyean-gwan get all || true
          kubectl -n hyean-gwan describe pods || true
          kubectl -n hyean-gwan logs deployment/gwan-api || true
          kubectl -n hyean-gwan logs deployment/postgres || true

      - name: Delete production kind cluster
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: kind delete cluster --name "${KIND_PRODUCTION_CLUSTER_NAME}"
